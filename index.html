<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organitzador Acadèmic | Supabase</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <h1>🎓 El meu Organitzador</h1>

    <div id="auth-section">
        <h2 id="auth-title">Identifica't</h2>
        <div class="form-group-auth">
            <input type="email" id="email" placeholder="Correu electrònic">
            <input type="password" id="password" placeholder="Contrasenya">
            <div class="auth-buttons">
                <button class="btn-done" onclick="handleAuth('login')">Entrar</button>
                <button class="btn-del" onclick="handleAuth('register')">Registrar-se</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header-app">
            <span>Hola, <strong id="user-display"></strong>!</span>
            <button class="btn-logout" onclick="logout()">Sortir 🚪</button>
        </div>
        
        <div class="form-group">
            <input type="text" id="task-name" placeholder="Nom de la tasca">
            <select id="task-type">
                <option value="deure">Deure</option>
                <option value="treball">Treball</option>
                <option value="examen">Examen</option>
            </select>
            <input type="date" id="task-date">
            <button class="btn-add" onclick="addTask()">Afegir Tasca</button>
        </div>

        <h2>Tasques Pendents</h2>
        <ul id="task-list" class="task-list"></ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
